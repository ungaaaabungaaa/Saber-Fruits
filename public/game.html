<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Saber Fruits</title>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  </head>
  <body class="game-page">
    <canvas id="game-canvas" aria-label="Saber Fruits game display"></canvas>

    <header class="game-hud" id="game-hud" aria-live="polite">
      <div class="hud-item">
        <iconify-icon icon="mdi:star-four-points"></iconify-icon>
        <span class="hud-label">Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="hud-item">
        <iconify-icon icon="mdi:heart"></iconify-icon>
        <span class="hud-label">Lives</span>
        <strong id="lives">5</strong>
      </div>
      <div class="hud-item">
        <iconify-icon icon="mdi:pound-box-outline"></iconify-icon>
        <span class="hud-label">Room</span>
        <strong id="hud-room">------</strong>
      </div>
      <div class="connection-pill" id="connection-pill">Waiting</div>
    </header>

    <section class="waiting-panel" id="waiting-panel">
      <div class="brand-lockup">
        <iconify-icon icon="mdi:sword" class="brand-icon"></iconify-icon>
        <h1>Saber Fruits</h1>
      </div>

      <div class="qr-wrap">
        <canvas id="qr-canvas" width="220" height="220"></canvas>
      </div>

      <div class="room-code" id="room-code">------</div>
      <p class="status-copy" id="status-copy">Pairing room...</p>
      <a class="manual-link" id="controller-link" href="#" target="_blank" rel="noreferrer">Open controller on this device</a>

      <button class="switch-toggle" id="infinite-button" type="button" role="switch" aria-checked="false">
        <span class="switch-label">
          <iconify-icon icon="mdi:infinity"></iconify-icon>
          <span>Infinite lives</span>
        </span>
        <span class="switch-track" aria-hidden="true">
          <span class="switch-thumb"></span>
        </span>
        <span class="switch-state">Off</span>
      </button>

      <div class="theme-picker" aria-label="Saber color">
        <span>Saber color</span>
        <div class="theme-dots">
          <button class="color-dot is-selected" type="button" data-saber-color="mint" aria-label="Mint saber" aria-pressed="true"></button>
          <button class="color-dot" type="button" data-saber-color="blue" aria-label="Blue saber" aria-pressed="false"></button>
          <button class="color-dot" type="button" data-saber-color="violet" aria-label="Violet saber" aria-pressed="false"></button>
          <button class="color-dot" type="button" data-saber-color="pink" aria-label="Pink saber" aria-pressed="false"></button>
          <button class="color-dot" type="button" data-saber-color="gold" aria-label="Gold saber" aria-pressed="false"></button>
          <button class="color-dot" type="button" data-saber-color="white" aria-label="White saber" aria-pressed="false"></button>
        </div>
      </div>

      <div class="waiting-actions">
        <button id="practice-button" type="button">
          <iconify-icon icon="mdi:cursor-default-click"></iconify-icon>
          <span>Practice</span>
        </button>
        <button id="reset-button" type="button">
          <iconify-icon icon="mdi:refresh"></iconify-icon>
          <span>Reset</span>
        </button>
      </div>
    </section>

    <script type="module" src="/game.js?v=theme-controls"></script>
  </body>
</html>
